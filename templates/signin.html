{% extends "base.html" %}
{% block content %}
<div class="signin-box" id="loginform">
  <h2>Connexion</h2>
  {% if error %}
  <div class="alert-error">{{ error }}</div>
  {% endif %}
  <form method="POST" action="/signin">
    <div class="form-group">
      <label for="email-id">Adresse email</label>
      <input type="email" id="email-id" name="email-id" placeholder="votre@email.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" placeholder="••••••••"/>
    </div>
    <div class="form-group checkbox-group">
      <label>
        <input type="checkbox" id="remember" name="remember"/>
        Se souvenir de moi
      </label>
    </div>
    <button type="submit" id="submit-id" class="btn btn-primary" style="width:100%">
      Connexion
    </button>
  </form>
</div>
{% endblock %}
